<!DOCTYPE html>
<html lang="zh-CN">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>日程安排助手 - 测试版</title>
        <link rel="manifest" href="manifest.json">
        <meta name="theme-color" content="#17a2b8">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="apple-mobile-web-app-title" content="日程助手">
        <style>
            body { font-family: Arial, sans-serif; padding: 20px; }
            .container { max-width: 600px; margin: 0 auto; }
            .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin: 20px 0; }
            .day { border: 1px solid #ddd; padding: 10px; text-align: center; min-height: 80px; }
            .day.today { background-color: #e6f7ee; }
            .day.has-event { background-color: #fff3cd; }
            .day.selected { background-color: #d1ecf1; border: 2px solid #17a2b8; }
            .event { font-size: 10px; margin-top: 5px; text-align: left; }
            input { width: 60%; padding: 10px; }
            button { padding: 10px 20px; }
            .voice-button { background-color: #f1f1f1; border: none; border-radius: 50%; width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; margin-left: 10px; }
            .voice-button.recording { background-color: #ff4757; color: white; }
            .schedule-item { margin: 10px 0; padding: 10px; border: 1px solid #ddd; }
            .loading { color: #666; font-size: 14px; margin-top: 10px; }
        </style>

    </head>
<body>
    <div class="container">
        <h1>日程安排助手</h1>
        <input type="text" id="input" placeholder="请输入日程安排...">
        <button onclick="addSchedule()">发送</button>
        <button class="voice-button" id="voice-button" onclick="toggleVoiceRecognition()">🎤</button>
        <button onclick="alert('测试声音按钮被点击！'); try { const audioContext = new (window.AudioContext || window.webkitAudioContext)(); const oscillator = audioContext.createOscillator(); const gainNode = audioContext.createGain(); oscillator.connect(gainNode); gainNode.connect(audioContext.destination); oscillator.frequency.setValueAtTime(800, audioContext.currentTime); oscillator.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 0.5); gainNode.gain.setValueAtTime(0.3, audioContext.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5); oscillator.start(audioContext.currentTime); oscillator.stop(audioContext.currentTime + 0.5); alert('声音测试成功！'); } catch (error) { console.error('播放声音失败:', error); alert('播放声音失败，请检查浏览器设置。错误信息：' + error.message); }" style="padding: 10px; margin-left: 10px; background-color: #17a2b8; color: white; border: none; border-radius: 4px; cursor: pointer;">测试声音</button>
        
        <!-- 提醒铃声 -->
        <audio id="notification-sound" preload="auto" controls style="display: none;">
            <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" type="audio/wav">
            <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
            您的浏览器不支持音频播放。
         </audio>
        
        <!-- 编辑日程表单 -->
        <div id="edit-form" style="display: none; margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 5px; background-color: #f9f9f9;">
            <h3>修改日程</h3>
            <input type="text" id="edit-title" placeholder="日程标题" style="width: 100%; padding: 10px; margin-bottom: 10px;">
            <input type="date" id="edit-date" style="width: 100%; padding: 10px; margin-bottom: 10px;">
            <input type="time" id="edit-time" style="width: 100%; padding: 10px; margin-bottom: 10px;">
            <div style="display: flex; justify-content: space-between;">
                <button onclick="saveEdit()" style="padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">保存</button>
                <button onclick="cancelEdit()" style="padding: 10px 20px; background-color: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer;">取消</button>
            </div>
        </div>
        
        <h2>日历视图</h2>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <button onclick="changeMonth(-1)">上一月</button>
            <h3 id="current-month"></h3>
            <button onclick="changeMonth(1)">下一月</button>
        </div>
        <div class="calendar" id="calendar"></div>
        
        <h2>日程列表</h2>
        <div id="schedules"></div>
    </div>
    
    <script>
        let schedules = [];
        let recognition = null;
        let isRecording = false;
        let recognitionTimer = null;
        let currentEditingIndex = -1;
        
        // 初始化语音识别
        function initVoiceRecognition() {
            // 检查浏览器是否支持Web Audio API
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                console.log('浏览器支持音频录制');
            } else {
                alert('您的浏览器不支持音频录制功能');
            }
        }
        
        // 语音识别配置
        let recognizer = null;
        let stream = null;
        
        // 日历配置
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let selectedDate = null;
        
        // 医疗和教学相关词汇的自定义词典
        const medicalTerms = [
            '辉瑞', '赛诺菲', '卫星会', '答辩', '学术会议', '临床试验', '药品', '医疗器械',
            '诊断', '治疗', '手术', '病例', '病历', '处方', '药物', '疫苗',
            '医生', '护士', '患者', '医院', '诊所', '医学院', '研究', '论文',
            '演讲', '报告', '讨论', '评审', '考核', '考试', '作业', '课程'
        ];
        
        // 识别结果修正函数
        function correctRecognitionResult(text) {
            // 修正常见的识别错误
            const corrections = {
                '回瑞': '辉瑞',
                '赛诺飞': '赛诺菲',
                '卫星': '卫星会',
                '答辩会': '答辩',
                '会认为': '会议',
                '费卫生': '卫生'
            };
            
            // 应用修正
            let correctedText = text;
            for (const [wrong, right] of Object.entries(corrections)) {
                correctedText = correctedText.replace(new RegExp(wrong, 'g'), right);
            }
            
            // 检查是否包含医疗或教学相关词汇
            for (const term of medicalTerms) {
                if (correctedText.includes(term)) {
                    // 确保术语正确识别
                    break;
                }
            }
            
            return correctedText;
        }
        
        // 初始化语音识别
        async function initVosk() {
            try {
                // 显示加载提示
                const loadingDiv = document.createElement('div');
                loadingDiv.id = 'loading';
                loadingDiv.className = 'loading';
                loadingDiv.textContent = '正在初始化语音识别服务...';
                document.querySelector('.container').appendChild(loadingDiv);
                
                // 检查浏览器是否支持Web Speech API
                if (!('webkitSpeechRecognition' in window)) {
                    throw new Error('您的浏览器不支持语音识别功能');
                }
                
                // 语音识别服务初始化完成
                loadingDiv.textContent = '语音识别服务初始化完成';
                setTimeout(() => {
                    loadingDiv.remove();
                }, 1000);
                
                return true;
            } catch (error) {
                console.error('初始化语音识别失败:', error);
                alert('语音识别初始化失败，请刷新页面重试');
                const loadingDiv = document.getElementById('loading');
                if (loadingDiv) {
                    loadingDiv.remove();
                }
                return false;
            }
        }
        
        // 开始录制音频
        async function startRecording() {
            try {
                // 确保语音识别服务已初始化
                if (!recognizer) {
                    const initialized = await initVosk();
                    if (!initialized) {
                        return false;
                    }
                }
                
                // 使用Web Speech API
                if ('webkitSpeechRecognition' in window) {
                    recognizer = new webkitSpeechRecognition();
                    recognizer.continuous = true;  // 设置为连续识别模式
                    recognizer.interimResults = true;
                    recognizer.lang = 'zh-CN';
                    
                    let finalTranscript = '';
                    
                    recognizer.onresult = function(event) {
                        let interimTranscript = '';
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            if (event.results[i].isFinal) {
                                finalTranscript += event.results[i][0].transcript;
                            } else {
                                interimTranscript += event.results[i][0].transcript;
                            }
                        }
                        
                        // 显示实时识别结果
                        document.getElementById('input').value = finalTranscript + interimTranscript;
                    };
                    
                    recognizer.onerror = function(event) {
                        console.error('语音识别错误:', event.error);
                        stopRecording();
                    };
                    
                    recognizer.onend = function() {
                        stopRecording();
                    };
                    
                    recognizer.start();
                    return true;
                } else {
                    alert('您的浏览器不支持语音识别功能');
                    return false;
                }
            } catch (error) {
                console.error('开始录制失败:', error);
                alert('无法访问麦克风，请检查权限设置');
                return false;
            }
        }
        
        // 停止录制音频
        function stopRecordingAudio() {
            if (recognizer && recognizer.stop) {
                try {
                    recognizer.stop();
                } catch (error) {
                    console.error('停止录音错误:', error);
                }
            }
        }
        
        // 停止录音
        function stopRecording() {
            isRecording = false;
            // 停止音频录制
            stopRecordingAudio();
            // 清除计时器，防止重复添加日程
            if (recognitionTimer) {
                clearTimeout(recognitionTimer);
                recognitionTimer = null;
            }
            const voiceButton = document.getElementById('voice-button');
            voiceButton.classList.remove('recording');
            voiceButton.textContent = '🎤';
        }
        
        // 切换语音识别状态
        async function toggleVoiceRecognition() {
            if (isRecording) {
                // 停止录音
                stopRecordingAudio();
                // 处理识别结果并添加日程
                const input = document.getElementById('input');
                const text = input.value.trim();
                if (text) {
                    // 修正识别结果
                    const correctedText = correctRecognitionResult(text);
                    input.value = correctedText;
                    addSchedule();
                }
                // 确保输入框被清空，为下一次输入做准备
                input.value = '';
                // 立即重置状态
                stopRecording();
            } else {
                isRecording = true;
                const voiceButton = document.getElementById('voice-button');
                voiceButton.classList.add('recording');
                voiceButton.textContent = '⏹️';
                
                // 开始录音
                const started = await startRecording();
                if (!started) {
                    stopRecording();
                }
            }
        }
        
        function generateCalendar() {
            try {
                const calendar = document.getElementById('calendar');
                if (!calendar) {
                    console.error('Calendar element not found');
                    return;
                }
                calendar.innerHTML = '';
                
                const today = new Date();
                
                // 更新当前月份显示
                const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
                const monthElement = document.getElementById('current-month');
                if (monthElement) {
                    monthElement.textContent = `${currentYear}年 ${monthNames[currentMonth]}`;
                }
                
                // 添加星期标题
                const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
                weekdays.forEach(day => {
                    const header = document.createElement('div');
                    header.style.fontWeight = 'bold';
                    header.textContent = day;
                    calendar.appendChild(header);
                });
                
                // 获取当月第一天是星期几
                const firstDay = new Date(currentYear, currentMonth, 1).getDay();
                
                // 添加上个月的占位天数
                for (let i = 0; i < firstDay; i++) {
                    const emptyDay = document.createElement('div');
                    calendar.appendChild(emptyDay);
                }
                
                // 获取当月的天数
                const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
                
                // 添加当月的天数
                for (let day = 1; day <= daysInMonth; day++) {
                    const dayElement = document.createElement('div');
                    dayElement.className = 'day';
                    
                    // 检查是否是今天
                    if (day === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()) {
                        dayElement.classList.add('today');
                    }
                    
                    // 检查当天是否有日程
                    const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const dayEvents = schedules.filter(schedule => schedule.date === dateStr);
                    
                    if (dayEvents.length > 0) {
                        dayElement.classList.add('has-event');
                    }
                    
                    // 添加日期数字
                    dayElement.innerHTML = `<div>${day}</div>`;
                    
                    // 将时间字符串转换为分钟数，用于排序
                    function timeToMinutes(timeStr) {
                        if (!timeStr) return 0;
                        const [hours, minutes] = timeStr.split(':').map(Number);
                        return hours * 60 + (minutes || 0);
                    }
                    
                    // 按时间顺序排序事件
                    const sortedDayEvents = [...dayEvents].sort((a, b) => {
                        if (a.time && b.time) {
                            return timeToMinutes(a.time) - timeToMinutes(b.time);
                        } else if (a.time) {
                            return -1; // 有时间的排在前面
                        } else if (b.time) {
                            return 1; // 有时间的排在前面
                        } else {
                            // 都没有时间，按录入时间排序
                            return (a.timestamp || 0) - (b.timestamp || 0);
                        }
                    });
                    
                    // 添加事件
                    sortedDayEvents.forEach(event => {
                        const eventElement = document.createElement('div');
                        eventElement.className = 'event';
                        eventElement.textContent = event.title + (event.time ? ` ${event.time}` : '');
                        dayElement.appendChild(eventElement);
                    });
                    
                    // 添加点击事件
                    dayElement.addEventListener('click', function() {
                        // 移除所有日期的选中状态
                        const allDays = document.querySelectorAll('.day');
                        allDays.forEach(d => d.classList.remove('selected'));
                        
                        // 添加当前日期的选中状态
                        dayElement.classList.add('selected');
                        
                        // 更新选中日期
                        selectedDate = dateStr;
                        
                        // 重新生成日程列表
                        updateSchedules();
                    });
                    
                    // 检查是否是选中日期
                    if (selectedDate === dateStr) {
                        dayElement.classList.add('selected');
                    }
                    
                    calendar.appendChild(dayElement);
                }
            } catch (error) {
                console.error('Error generating calendar:', error);
            }
        }
        
        // 切换月份
        function changeMonth(direction) {
            currentMonth += direction;
            
            // 处理月份边界
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            
            // 重新生成日历
            generateCalendar();
        }
        
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        function parseSchedule(text) {
            let date = null;
            let time = null;
            let location = null;
            let people = null;
            
            // 解析日期
            if (text.includes('今天')) {
                date = new Date();
            } else if (text.includes('明天')) {
                date = new Date();
                date.setDate(date.getDate() + 1);
            } else if (text.includes('后天')) {
                date = new Date();
                date.setDate(date.getDate() + 2);
            } else {
                // 尝试匹配中文日期格式：三月十二号、三月十二
                const chineseDateRegex = /(\d+)月(\d+)号?/;
                const chineseDateMatch = text.match(chineseDateRegex);
                if (chineseDateMatch) {
                    const month = parseInt(chineseDateMatch[1]);
                    const day = parseInt(chineseDateMatch[2]);
                    date = new Date(new Date().getFullYear(), month - 1, day);
                } else {
                    // 尝试匹配中文数字月份格式：三月十二号、三月十二
                    const chineseMonthMap = {
                        '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6,
                        '七': 7, '八': 8, '九': 9, '十': 10, '十一': 11, '十二': 12
                    };
                    const chineseDayMap = {
                        '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6,
                        '七': 7, '八': 8, '九': 9, '十': 10, '十一': 11, '十二': 12,
                        '十三': 13, '十四': 14, '十五': 15, '十六': 16, '十七': 17, '十八': 18,
                        '十九': 19, '二十': 20, '二十一': 21, '二十二': 22, '二十三': 23, '二十四': 24,
                        '二十五': 25, '二十六': 26, '二十七': 27, '二十八': 28, '二十九': 29, '三十': 30, '三十一': 31
                    };
                    // 尝试匹配中文数字日期：三月十二号、三月十二
                    const chineseDateRegex = /(一|二|三|四|五|六|七|八|九|十|十一|十二)月(一|二|三|四|五|六|七|八|九|十|十一|十二|十三|十四|十五|十六|十七|十八|十九|二十|二十一|二十二|二十三|二十四|二十五|二十六|二十七|二十八|二十九|三十|三十一)号?/;
                    const chineseDateMatch = text.match(chineseDateRegex);
                    if (chineseDateMatch) {
                        const month = chineseMonthMap[chineseDateMatch[1]];
                        const day = chineseDayMap[chineseDateMatch[2]];
                        date = new Date(new Date().getFullYear(), month - 1, day);
                    } else {
                        // 尝试匹配中文数字月份+阿拉伯数字日期：三月12号、三月12
                        const chineseMonthRegex = /(一|二|三|四|五|六|七|八|九|十|十一|十二)月(\d+)号?/;
                        const chineseMonthMatch = text.match(chineseMonthRegex);
                        if (chineseMonthMatch) {
                            const month = chineseMonthMap[chineseMonthMatch[1]];
                            const day = parseInt(chineseMonthMatch[2]);
                            date = new Date(new Date().getFullYear(), month - 1, day);
                        } else {
                            // 尝试匹配其他日期格式
                            const dateRegex = /(\d{4})年(\d{1,2})月(\d{1,2})日|(\d{1,2})月(\d{1,2})日|(\d{4})-(\d{1,2})-(\d{1,2})|(\d{1,2})\/(\d{1,2})|(\d{1,2})\.(\d{1,2})/;
                            const dateMatch = text.match(dateRegex);
                            if (dateMatch) {
                                if (dateMatch[1]) {
                                    // 2023年10月1日
                                    date = new Date(parseInt(dateMatch[1]), parseInt(dateMatch[2]) - 1, parseInt(dateMatch[3]));
                                } else if (dateMatch[4]) {
                                    // 10月1日
                                    date = new Date(new Date().getFullYear(), parseInt(dateMatch[4]) - 1, parseInt(dateMatch[5]));
                                } else if (dateMatch[6]) {
                                    // 2023-10-01
                                    date = new Date(parseInt(dateMatch[6]), parseInt(dateMatch[7]) - 1, parseInt(dateMatch[8]));
                                } else if (dateMatch[9]) {
                                    // 10/01
                                    date = new Date(new Date().getFullYear(), parseInt(dateMatch[9]) - 1, parseInt(dateMatch[10]));
                                } else if (dateMatch[11]) {
                                    // 10.01 或 3.1
                                    date = new Date(new Date().getFullYear(), parseInt(dateMatch[11]) - 1, parseInt(dateMatch[12]));
                                }
                            }
                        }
                    }
                }
            }
            
            // 解析时间
            // 汉字数字映射
            const chineseNumberMap = {
                '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6, '七': 7, '八': 8, '九': 9,
                '十': 10, '十一': 11, '十二': 12, '十三': 13, '十四': 14, '十五': 15, '十六': 16,
                '十七': 17, '十八': 18, '十九': 19, '二十': 20, '二十一': 21, '二十二': 22, '二十三': 23
            };
            
            // 解析时间
            const timeRegex = /(上午|下午)?(\d{1,2}):(\d{2})|(上午|下午)?(\d{1,2})点(\d{2})分?|(上午|下午)?(\d{1,2})点|(上午|下午)?(一|二|三|四|五|六|七|八|九|十|十一|十二|十三|十四|十五|十六|十七|十八|十九|二十|二十一|二十二|二十三)点(\d{1,2})分?|(上午|下午)?(一|二|三|四|五|六|七|八|九|十|十一|十二|十三|十四|十五|十六|十七|十八|十九|二十|二十一|二十二|二十三)点/;
            const timeMatch = text.match(timeRegex);
            if (timeMatch) {
                let hour = 0;
                let minute = '00';
                let isAfternoon = false;
                
                // 检查是否有上午/下午前缀
                if (timeMatch[1] || timeMatch[4] || timeMatch[7] || timeMatch[10] || timeMatch[13]) {
                    isAfternoon = (timeMatch[1] === '下午' || timeMatch[4] === '下午' || timeMatch[7] === '下午' || timeMatch[10] === '下午' || timeMatch[13] === '下午');
                }
                
                if (timeMatch[2]) {
                    // 12:30 格式
                    hour = parseInt(timeMatch[2]);
                    minute = timeMatch[3];
                } else if (timeMatch[5]) {
                    // 12点30分 格式
                    hour = parseInt(timeMatch[5]);
                    minute = timeMatch[6] || '00';
                } else if (timeMatch[8]) {
                    // 12点 格式
                    hour = parseInt(timeMatch[8]);
                } else if (timeMatch[11]) {
                    // 两点30分 格式
                    hour = chineseNumberMap[timeMatch[11]];
                    minute = timeMatch[12] || '00';
                } else if (timeMatch[14]) {
                    // 两点 格式
                    hour = chineseNumberMap[timeMatch[14]];
                }
                
                // 处理下午时间
                if (isAfternoon && hour < 12) {
                    hour += 12;
                }
                
                // 处理12点的特殊情况
                if (!isAfternoon && hour === 12) {
                    hour = 0; // 上午12点视为0点
                }
                
                time = `${hour}:${minute}`;
            }
            
            // 提取标题
            let title = text;
            if (date) {
                title = title.replace(/\d{4}年\d{1,2}月\d{1,2}日|\d{1,2}月\d{1,2}日|\d{1,2}月\d+号?|(一|二|三|四|五|六|七|八|九|十|十一|十二)月(一|二|三|四|五|六|七|八|九|十|十一|十二|十三|十四|十五|十六|十七|十八|十九|二十|二十一|二十二|二十三|二十四|二十五|二十六|二十七|二十八|二十九|三十|三十一)号?|(一|二|三|四|五|六|七|八|九|十|十一|十二)月\d+号?|\d{4}-\d{1,2}-\d{1,2}|\d{1,2}\/\d{1,2}|\d{1,2}\.\d{1,2}|今天|明天|后天/g, '');
            }
            if (time) {
                title = title.replace(/(上午|下午)?\d{1,2}:\d{2}|(上午|下午)?\d{1,2}点\d{2}分?|(上午|下午)?\d{1,2}点|(上午|下午)?(一|二|三|四|五|六|七|八|九|十|十一|十二|十三|十四|十五|十六|十七|十八|十九|二十|二十一|二十二|二十三)点\d{1,2}分?|(上午|下午)?(一|二|三|四|五|六|七|八|九|十|十一|十二|十三|十四|十五|十六|十七|十八|十九|二十|二十一|二十二|二十三)点/g, '');
            }
            title = title.trim();
            
            return {
                title: title,
                date: date ? formatDate(date) : null,
                time: time
            };
        }
        
        function addSchedule() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text) return;
            
            const schedule = parseSchedule(text);
            // 添加录入时间戳
            schedule.timestamp = Date.now();
            schedules.push(schedule);
            input.value = '';
            
            generateCalendar();
            updateSchedules();
            // 重新设置提醒，确保新添加的日程也能被提醒
            setupReminders();
        }
        
        function updateSchedules() {
            try {
                const container = document.getElementById('schedules');
                if (!container) {
                    console.error('Schedules container not found');
                    return;
                }
                container.innerHTML = '';
                
                // 获取显示日期
                const displayDate = selectedDate || formatDate(new Date());
                
                // 将时间字符串转换为分钟数，用于排序
                function timeToMinutes(timeStr) {
                    if (!timeStr) return 0;
                    const [hours, minutes] = timeStr.split(':').map(Number);
                    return hours * 60 + (minutes || 0);
                }
                
                // 排序日程：先按日期，再按时间，最后按录入时间
                const sortedSchedules = [...schedules].sort((a, b) => {
                    // 首先按日期排序
                    if (a.date && b.date) {
                        if (a.date !== b.date) {
                            return a.date.localeCompare(b.date);
                        }
                        // 同一天的事件，按时间排序
                        if (a.time && b.time) {
                            // 将时间转换为分钟数进行比较
                            return timeToMinutes(a.time) - timeToMinutes(b.time);
                        } else if (a.time) {
                            return -1; // 有时间的排在前面
                        } else if (b.time) {
                            return 1; // 有时间的排在前面
                        } else {
                            // 都没有时间，按录入时间排序
                            return (a.timestamp || 0) - (b.timestamp || 0);
                        }
                    } else if (a.date) {
                        return -1; // 有日期的排在前面
                    } else if (b.date) {
                        return 1; // 有日期的排在前面
                    } else {
                        // 都没有日期，按录入时间排序
                        return (a.timestamp || 0) - (b.timestamp || 0);
                    }
                });
                
                // 过滤出选中日期的日程
                const dateSchedules = sortedSchedules.filter(schedule => schedule.date === displayDate);
                
                if (dateSchedules.length > 0) {
                    dateSchedules.forEach((schedule, index) => {
                        const div = document.createElement('div');
                        div.className = 'schedule-item';
                        div.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                <h3>${schedule.title || '未命名日程'}</h3>
                                <div>
                                    <button onclick="editSchedule(${index})" style="background-color: #ffc107; color: black; border: none; border-radius: 4px; padding: 4px 8px; font-size: 12px; cursor: pointer; margin-right: 5px;">修改</button>
                                    <button onclick="deleteSchedule(${index})" style="background-color: #dc3545; color: white; border: none; border-radius: 4px; padding: 4px 8px; font-size: 12px; cursor: pointer;">删除</button>
                                </div>
                            </div>
                            <p>日期：${schedule.date || '未设置'}</p>
                            ${schedule.time ? `<p>时间：${schedule.time}</p>` : ''}
                        `;
                        container.appendChild(div);
                    });
                } else {
                    // 选中日期没有日程时显示提示
                    const emptyDiv = document.createElement('div');
                    emptyDiv.className = 'schedule-item';
                    emptyDiv.innerHTML = `<p>${selectedDate ? '选中日期' : '今天'}没有日程安排</p>`;
                    container.appendChild(emptyDiv);
                }
            } catch (error) {
                console.error('Error updating schedules:', error);
                const container = document.getElementById('schedules');
                if (container) {
                    container.innerHTML = '<div class="schedule-item"><p>加载日程时出错</p></div>';
                }
            }
        }
        
        // 设置闹钟提醒
        function setupReminders() {
            const now = new Date();
            
            schedules.forEach(schedule => {
                if (schedule.date) {
                    const scheduleDate = new Date(schedule.date);
                    const scheduleYear = scheduleDate.getFullYear();
                    const scheduleMonth = scheduleDate.getMonth();
                    const scheduleDay = scheduleDate.getDate();
                    
                    // 设置当天早晨7:30的提醒
                    const morningReminder = new Date(scheduleYear, scheduleMonth, scheduleDay, 7, 30, 0);
                    if (morningReminder > now) {
                        const timeUntilMorning = morningReminder - now;
                        setTimeout(() => {
                            // 播放提醒声音
                            const sound = document.getElementById('notification-sound');
                            if (sound) {
                                // 重置音频播放位置
                                sound.currentTime = 0;
                                sound.play().then(() => {
                                    console.log('提醒声音播放成功');
                                }).catch(error => {
                                    console.error('播放声音失败:', error);
                                });
                            }
                            alert(`提醒：今天有日程安排：${schedule.title}`);
                        }, timeUntilMorning);
                    }
                    
                    // 如果有时间，设置提前1小时的提醒
                    if (schedule.time) {
                        const [hours, minutes] = schedule.time.split(':').map(Number);
                        const eventTime = new Date(scheduleYear, scheduleMonth, scheduleDay, hours, minutes, 0);
                        const reminderTime = new Date(eventTime.getTime() - 60 * 60 * 1000); // 提前1小时
                        
                        if (reminderTime > now) {
                            const timeUntilReminder = reminderTime - now;
                            setTimeout(() => {
                                // 播放提醒声音
                                const sound = document.getElementById('notification-sound');
                                if (sound) {
                                    // 重置音频播放位置
                                    sound.currentTime = 0;
                                    sound.play().then(() => {
                                        console.log('提醒声音播放成功');
                                    }).catch(error => {
                                        console.error('播放声音失败:', error);
                                    });
                                }
                                alert(`提醒：1小时后有日程：${schedule.title}`);
                            }, timeUntilReminder);
                        }
                    }
                }
            });
        }
        
        // 编辑日程
        function editSchedule(index) {
            // 获取当前显示的日期
            const displayDate = selectedDate || formatDate(new Date());
            // 过滤出该日期的所有日程
            const dateSchedules = schedules.filter(schedule => schedule.date === displayDate);
            // 获取要编辑的日程
            const scheduleToEdit = dateSchedules[index];
            // 在原始schedules数组中找到该日程的索引
            const scheduleIndex = schedules.findIndex(schedule => 
                schedule.title === scheduleToEdit.title && 
                schedule.date === scheduleToEdit.date && 
                schedule.time === scheduleToEdit.time
            );
            if (scheduleIndex !== -1) {
                // 保存当前编辑的索引
                currentEditingIndex = scheduleIndex;
                // 填充编辑表单
                document.getElementById('edit-title').value = scheduleToEdit.title || '';
                document.getElementById('edit-date').value = scheduleToEdit.date || '';
                document.getElementById('edit-time').value = scheduleToEdit.time || '';
                // 显示编辑表单
                document.getElementById('edit-form').style.display = 'block';
            }
        }
        
        // 保存编辑
        function saveEdit() {
            if (currentEditingIndex === -1) return;
            
            // 获取表单值
            const title = document.getElementById('edit-title').value.trim();
            const date = document.getElementById('edit-date').value;
            const time = document.getElementById('edit-time').value;
            
            // 更新日程
            schedules[currentEditingIndex].title = title || '未命名日程';
            schedules[currentEditingIndex].date = date;
            schedules[currentEditingIndex].time = time;
            
            // 隐藏编辑表单
            document.getElementById('edit-form').style.display = 'none';
            // 重置编辑索引
            currentEditingIndex = -1;
            
            // 重新生成日历和更新日程列表
            generateCalendar();
            updateSchedules();
            // 重新设置提醒
            setupReminders();
        }
        
        // 取消编辑
        function cancelEdit() {
            // 隐藏编辑表单
            document.getElementById('edit-form').style.display = 'none';
            // 重置编辑索引
            currentEditingIndex = -1;
        }
        
        // 删除日程
        function deleteSchedule(index) {
            // 获取当前显示的日期
            const displayDate = selectedDate || formatDate(new Date());
            // 过滤出该日期的所有日程
            const dateSchedules = schedules.filter(schedule => schedule.date === displayDate);
            // 获取要删除的日程
            const scheduleToDelete = dateSchedules[index];
            // 在原始schedules数组中找到并删除该日程
            const scheduleIndex = schedules.findIndex(schedule => 
                schedule.title === scheduleToDelete.title && 
                schedule.date === scheduleToDelete.date && 
                schedule.time === scheduleToDelete.time
            );
            if (scheduleIndex !== -1) {
                schedules.splice(scheduleIndex, 1);
                // 重新生成日历和更新日程列表
                generateCalendar();
                updateSchedules();
                // 重新设置提醒
                setupReminders();
            }
        }
        
        // 检查并设置提醒
        function checkReminders() {
            setupReminders();
            // 每小时检查一次
            setInterval(setupReminders, 60 * 60 * 1000);
        }
        
        // 测试声音
        function testSound() {
            alert('测试声音按钮被点击！');
            // 使用Web Audio API生成提示音，避免外部音频文件和跨域问题
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 0.5);
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.5);
                
                alert('声音测试成功！');
            } catch (error) {
                console.error('播放声音失败:', error);
                alert('播放声音失败，请检查浏览器设置。错误信息：' + error.message);
            }
        }
        
        // 初始化
        function init() {
            generateCalendar();
            updateSchedules();
            initVoiceRecognition();
            checkReminders();
        }
        
        window.onload = init;
        
        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js')
              .then(registration => {
                console.log('Service Worker registered successfully');
              })
              .catch(error => {
                console.error('Service Worker registration failed:', error);
              });
          });
        }
    </script>
</body>
